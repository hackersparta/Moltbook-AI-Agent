<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments - Moltbook</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .topbar {
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar h1 { font-size: 1.2em; color: #fff; font-weight: 600; }
        .topbar h1 span { color: #4ade80; }
        .back-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85em;
            text-decoration: none;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #ccc;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #2a2a2a; color: #fff; }

        /* Summary bar */
        .summary {
            display: flex;
            gap: 1px;
            background: #2a2a2a;
            margin: 24px 32px;
            border-radius: 12px;
            overflow: hidden;
        }
        .summary-item {
            flex: 1;
            background: #1a1a1a;
            padding: 20px 24px;
            text-align: center;
        }
        .summary-item .num { font-size: 2em; font-weight: 700; color: #fff; }
        .summary-item .label { font-size: 0.8em; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        /* Posts */
        .posts { padding: 0 32px 40px; display: grid; gap: 16px; }

        .post {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
        }
        .post-head {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a2a;
        }
        .post-title {
            font-size: 1em;
            color: #fff;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .post-stats {
            display: flex;
            gap: 16px;
            font-size: 0.8em;
            color: #666;
        }

        /* Comments */
        .comments-list { padding: 12px 24px 20px; }
        .comment {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid #1f1f1f;
            align-items: flex-start;
        }
        .comment:last-child { border-bottom: none; }

        .comment-score {
            min-width: 42px;
            height: 42px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .cs-high { background: #166534; }
        .cs-mid { background: #854d0e; }
        .cs-low { background: #7f1d1d; }

        .comment-body { flex: 1; min-width: 0; }
        .comment-author { font-size: 0.8em; color: #4ade80; font-weight: 600; margin-bottom: 4px; }
        .comment-text { font-size: 0.85em; color: #aaa; line-height: 1.5; margin-bottom: 8px; }
        .comment-analysis {
            background: #111;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.8em;
            color: #777;
            line-height: 1.5;
        }
        .comment-analysis strong { color: #aaa; }

        .no-comments { padding: 20px 24px; color: #555; font-size: 0.9em; }

        .post-link {
            display: inline-block;
            padding: 6px 14px;
            background: #262626;
            color: #4ade80;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.8em;
            border: 1px solid #333;
            margin-top: 4px;
        }
        .post-link:hover { background: #333; }

        .empty { text-align: center; padding: 60px; color: #555; font-size: 1.1em; }

        @media (max-width: 768px) {
            .topbar, .summary, .posts { padding-left: 16px; padding-right: 16px; }
            .summary { margin: 16px; flex-wrap: wrap; }
            .summary-item { min-width: 50%; }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <h1>💬 My Posts & <span>Comments</span></h1>
        <a href="/" class="back-btn">← Dashboard</a>
    </div>

    <div class="summary" id="summary">
        <div class="summary-item"><div class="num" id="total-posts">-</div><div class="label">Your Posts</div></div>
        <div class="summary-item"><div class="num" id="total-comments">-</div><div class="label">Total Comments</div></div>
        <div class="summary-item"><div class="num" id="opportunities" style="color:#4ade80">-</div><div class="label">Opportunities</div></div>
    </div>

    <div class="posts" id="posts">
        <div class="empty">Loading...</div>
    </div>

    <script>
        async function loadData() {
            try {
                const [postsRes, commRes] = await Promise.all([
                    fetch('/api/my-posts'),
                    fetch('/api/comment-opportunities?min_score=0')
                ]);
                const postsData = await postsRes.json();
                const commData = await commRes.json();
                render(postsData, commData);
            } catch (e) {
                document.getElementById('posts').innerHTML = '<div class="empty">No data yet. The scheduler will collect comments automatically.</div>';
            }
        }

        function render(postsData, commData) {
            const opps = (commData.opportunities || []).filter(o => (o.analysis?.feasibility_score || 0) >= 50);
            document.getElementById('total-posts').textContent = postsData.total_posts || 0;
            document.getElementById('total-comments').textContent = postsData.total_comments || 0;
            document.getElementById('opportunities').textContent = opps.length;

            const container = document.getElementById('posts');
            const posts = postsData.posts || [];

            if (!posts.length) {
                container.innerHTML = '<div class="empty">No posts yet.</div>';
                return;
            }

            container.innerHTML = posts.map(post => {
                const postComments = (commData.opportunities || []).filter(o => o.original_post_id === post.id);

                return `
                <div class="post">
                    <div class="post-head">
                        <div class="post-title">${(post.content || '').substring(0, 180)}${(post.content || '').length > 180 ? '...' : ''}</div>
                        <div class="post-stats">
                            <span>⬆ ${post.score || 0}</span>
                            <span>💬 ${post.comment_count || 0}</span>
                            <span>${post.created_at ? new Date(post.created_at).toLocaleDateString() : ''}</span>
                            ${post.url ? `<a href="${post.url}" target="_blank" class="post-link">Open →</a>` : ''}
                        </div>
                    </div>
                    <div class="${postComments.length ? 'comments-list' : 'no-comments'}">
                        ${postComments.length ? postComments.map(c => {
                            const s = c.analysis?.feasibility_score || 0;
                            const cls = s >= 70 ? 'cs-high' : s >= 50 ? 'cs-mid' : 'cs-low';
                            return `
                            <div class="comment">
                                <div class="comment-score ${cls}">${s}</div>
                                <div class="comment-body">
                                    <div class="comment-author">${c.author || 'Unknown'}</div>
                                    <div class="comment-text">${(c.content || '').substring(0, 250)}${(c.content || '').length > 250 ? '...' : ''}</div>
                                    <div class="comment-analysis">
                                        <strong>Service:</strong> ${c.analysis?.service_description || '-'}<br>
                                        <strong>Potential:</strong> ${c.analysis?.business_potential || '-'}<br>
                                        <strong>Action:</strong> ${c.analysis?.recommendation || '-'}
                                    </div>
                                </div>
                            </div>`;
                        }).join('') : 'No analyzed comments yet — they get collected automatically.'}
                    </div>
                </div>`;
            }).join('');
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>

</html>
