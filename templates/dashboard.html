<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moltbook Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Top bar */
        .topbar {
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar h1 { font-size: 1.2em; color: #fff; font-weight: 600; }
        .topbar h1 span { color: #4ade80; }
        .topbar-right { display: flex; gap: 12px; align-items: center; }
        .topbar-right a, .topbar-right button {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85em;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #ccc;
            transition: all 0.2s;
        }
        .topbar-right a:hover, .topbar-right button:hover {
            background: #2a2a2a;
            color: #fff;
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 1px;
            background: #2a2a2a;
            margin: 24px 32px;
            border-radius: 12px;
            overflow: hidden;
        }
        .stat {
            flex: 1;
            background: #1a1a1a;
            padding: 20px 24px;
            text-align: center;
        }
        .stat .num { font-size: 2em; font-weight: 700; color: #fff; }
        .stat .label { font-size: 0.8em; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        /* Filters */
        .filters {
            padding: 0 32px;
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pill {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85em;
            cursor: pointer;
            border: 1px solid #333;
            background: transparent;
            color: #aaa;
            transition: all 0.2s;
        }
        .pill:hover { border-color: #555; color: #fff; }
        .pill.active { background: #4ade80; color: #000; border-color: #4ade80; font-weight: 600; }

        /* Ideas list */
        .ideas { padding: 0 32px 40px; display: grid; gap: 12px; }

        .idea {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px;
            transition: border-color 0.2s;
            cursor: default;
        }
        .idea:hover { border-color: #444; }

        /* Score bar on left */
        .idea-row { display: flex; gap: 20px; align-items: flex-start; }
        .idea-score {
            min-width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .score-green { background: #166534; }
        .score-yellow { background: #854d0e; }
        .score-orange { background: #9a3412; }
        .score-red { background: #7f1d1d; }

        .idea-body { flex: 1; min-width: 0; }
        .idea-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .idea-meta {
            display: flex;
            gap: 16px;
            font-size: 0.8em;
            color: #666;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .idea-rec {
            font-size: 0.9em;
            color: #a3a3a3;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        /* Tags */
        .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag {
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            background: #262626;
            color: #888;
            border: 1px solid #333;
        }

        /* Quick facts row */
        .facts {
            display: flex;
            gap: 24px;
            font-size: 0.8em;
            color: #666;
            margin-top: 8px;
        }
        .facts strong { color: #aaa; }

        /* Expand */
        .idea-expand {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #2a2a2a;
        }
        .idea-expand.open { display: block; }
        .expand-section { margin-bottom: 12px; }
        .expand-section h4 { font-size: 0.85em; color: #4ade80; margin-bottom: 6px; }
        .expand-section li, .expand-section p { font-size: 0.85em; color: #999; line-height: 1.6; }
        .expand-section ul { list-style: none; padding: 0; }
        .expand-section li::before { content: "→ "; color: #555; }

        .content-box {
            background: #111;
            border-radius: 8px;
            padding: 14px;
            font-size: 0.85em;
            color: #777;
            line-height: 1.6;
            max-height: 120px;
            overflow: hidden;
        }

        .link-btn {
            display: inline-block;
            padding: 8px 16px;
            background: #262626;
            color: #4ade80;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85em;
            margin-top: 8px;
            border: 1px solid #333;
        }
        .link-btn:hover { background: #333; }

        .toggle-btn {
            background: none;
            border: none;
            color: #4ade80;
            cursor: pointer;
            font-size: 0.85em;
            padding: 4px 0;
        }
        .toggle-btn:hover { text-decoration: underline; }

        .empty { text-align: center; padding: 60px; color: #555; font-size: 1.1em; }

        @media (max-width: 768px) {
            .topbar, .stats-row, .filters, .ideas { padding-left: 16px; padding-right: 16px; }
            .stats-row { margin: 16px; flex-wrap: wrap; }
            .stat { min-width: 50%; }
            .idea-row { flex-direction: column; gap: 12px; }
            .idea-score { width: 56px; }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <h1>🦞 Moltbook <span>Dashboard</span></h1>
        <div class="topbar-right">
            <a href="/ig" style="background:#F5A623;color:#000;border-color:#F5A623;font-weight:600">📸 IG Auto-Poster</a>
            <a href="/comments">💬 Comments</a>
            <button onclick="markAllSeen()">✅ Mark Seen</button>
        </div>
    </div>

    <div class="stats-row" id="stats">
        <div class="stat"><div class="num" id="total-posts">-</div><div class="label">Total Ideas</div></div>
        <div class="stat"><div class="num" id="new-posts" style="color:#4ade80">-</div><div class="label">New</div></div>
        <div class="stat"><div class="num" id="seen-posts">-</div><div class="label">Seen</div></div>
    </div>

    <div class="filters">
        <button class="pill active" onclick="setFilter('all', this)">All</button>
        <button class="pill" onclick="setFilter('high', this)">High (70+)</button>
        <button class="pill" onclick="setFilter('medium', this)">Medium (50-69)</button>
        <button class="pill" onclick="setFilter('low', this)">Low (&lt;50)</button>
    </div>

    <div class="ideas" id="ideas">
        <div class="empty">Loading...</div>
    </div>

    <script>
        let allIdeas = [];
        let currentFilter = 'all';

        async function loadStats() {
            const res = await fetch('/api/stats');
            const s = await res.json();
            document.getElementById('total-posts').textContent = s.total_posts;
            document.getElementById('new-posts').textContent = s.new_posts;
            document.getElementById('seen-posts').textContent = s.seen_posts;
        }

        async function loadIdeas() {
            const res = await fetch('/api/ideas');
            allIdeas = await res.json();
            render();
        }

        function setFilter(f, el) {
            currentFilter = f;
            document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function getScoreClass(s) {
            if (s >= 70) return 'score-green';
            if (s >= 50) return 'score-yellow';
            if (s >= 30) return 'score-orange';
            return 'score-red';
        }

        function toggle(id) {
            document.getElementById('exp-' + id).classList.toggle('open');
        }

        function render() {
            const c = document.getElementById('ideas');
            let list = allIdeas;

            if (currentFilter === 'high') list = list.filter(i => i.analysis.feasibility_score >= 70);
            else if (currentFilter === 'medium') list = list.filter(i => i.analysis.feasibility_score >= 50 && i.analysis.feasibility_score < 70);
            else if (currentFilter === 'low') list = list.filter(i => i.analysis.feasibility_score < 50);

            if (!list.length) { c.innerHTML = '<div class="empty">No ideas match this filter</div>'; return; }

            c.innerHTML = list.map((idea, idx) => {
                const s = idea.analysis.feasibility_score;
                const a = idea.analysis;

                const tags = (a.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
                const canDo = (a.reasons_can_do || []).map(r => `<li>${r}</li>`).join('');
                const cantDo = (a.reasons_cant_do || []).map(r => `<li>${r}</li>`).join('');
                const insights = (a.key_insights || []).map(r => `<li>${r}</li>`).join('');

                return `
                <div class="idea">
                    <div class="idea-row">
                        <div class="idea-score ${getScoreClass(s)}">${s}</div>
                        <div class="idea-body">
                            <div class="idea-title">${idea.title || 'Untitled'}</div>
                            <div class="idea-meta">
                                <span>by ${idea.author}</span>
                                <span>⬆ ${idea.score}</span>
                                <span>💬 ${idea.comment_count}</span>
                                ${a.business_model && a.business_model !== 'Unknown' ? `<span>💼 ${a.business_model}</span>` : ''}
                                ${a.time_estimate && a.time_estimate !== 'Unknown' ? `<span>⏱ ${a.time_estimate}</span>` : ''}
                                ${a.profit_potential && a.profit_potential !== 'Unknown' ? `<span>💰 ${a.profit_potential}</span>` : ''}
                            </div>
                            ${tags ? `<div class="tags">${tags}</div>` : ''}
                            <div class="idea-rec">${a.recommendation || ''}</div>
                            <button class="toggle-btn" onclick="toggle(${idx})">Show details ▾</button>

                            <div class="idea-expand" id="exp-${idx}">
                                ${insights ? `<div class="expand-section"><h4>Key Insights</h4><ul>${insights}</ul></div>` : ''}
                                ${canDo ? `<div class="expand-section"><h4>Your Matching Skills</h4><ul>${canDo}</ul></div>` : ''}
                                ${cantDo ? `<div class="expand-section"><h4>Missing Skills</h4><ul>${cantDo}</ul></div>` : ''}
                                ${idea.content ? `<div class="expand-section"><h4>Original Post</h4><div class="content-box">${idea.content.substring(0, 500)}${idea.content.length > 500 ? '...' : ''}</div></div>` : ''}
                                <a href="${idea.url}" target="_blank" class="link-btn">Open on Moltbook →</a>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function markAllSeen() {
            if (confirm('Mark all ideas as seen?')) {
                await fetch('/api/mark_seen', { method: 'POST' });
                await loadStats();
            }
        }

        loadStats();
        loadIdeas();
        setInterval(loadStats, 30000);
    </script>
</body>

</html>
    </script>
</body>

</html>
