<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Moltbook Idea Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .filters {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .ideas-grid {
            display: grid;
            gap: 20px;
        }

        .idea-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .idea-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
        }

        .idea-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .idea-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 10px;
            flex: 1;
        }

        .feasibility-badge {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.9em;
            white-space: nowrap;
            margin-left: 20px;
        }

        .badge-green {
            background: #10b981;
            color: white;
        }

        .badge-yellow {
            background: #f59e0b;
            color: white;
        }

        .badge-orange {
            background: #f97316;
            color: white;
        }

        .badge-red {
            background: #ef4444;
            color: white;
        }

        .idea-meta {
            display: flex;
            gap: 20px;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            margin: 0 auto 15px;
        }

        .recommendation {
            background: #f0f9ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
        }

        .reasons {
            margin: 15px 0;
        }

        .reason-item {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .reason-item:last-child {
            border-bottom: none;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }

        .detail-item {
            text-align: center;
            padding: 10px;
            background: #f9fafb;
            border-radius: 10px;
        }

        .detail-label {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
        }

        .detail-value {
            font-weight: bold;
            color: #333;
        }

        .view-post-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .view-post-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .content-preview {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            max-height: 150px;
            overflow: hidden;
            position: relative;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: white;
        }

        .mark-seen-btn {
            padding: 12px 30px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .mark-seen-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .action-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
            font-weight: 500;
        }

        .action-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .action-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>💰 Moltbook Idea Analyzer</h1>
            <p style="color: #666;">AI-powered analysis of money-making opportunities from Moltbook</p>

            <div class="stats-grid" id="stats">
                <div class="stat-card">
                    <div class="number" id="total-posts">-</div>
                    <div class="label">Total Ideas</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="new-posts">-</div>
                    <div class="label">New Ideas</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="seen-posts">-</div>
                    <div class="label">Already Seen</div>
                </div>
            </div>
        </div>

        <div class="filters">
            <div
                style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterIdeas('all')">All Ideas</button>
                    <button class="filter-btn" onclick="filterIdeas('new')">New Only</button>
                    <button class="filter-btn" onclick="filterIdeas('high')">🟢 High Priority (70+)</button>
                    <button class="filter-btn" onclick="filterIdeas('medium')">🟡 Medium (50-69)</button>
                    <button class="mark-seen-btn" onclick="markAllSeen()">✅ Mark All as Seen</button>
                </div>

                <a href="/comments" class="action-btn" style="text-decoration: none;">
                    💬 View My Posts & Comments Analysis
                </a>
            </div>
        </div>

        <div class="ideas-grid" id="ideas">
            <div class="loading">Loading ideas...</div>
        </div>
    </div>

    <script>
        let allIdeas = [];
        let currentFilter = 'all';

        // Load stats
        async function loadStats() {
            const response = await fetch('/api/stats');
            const stats = await response.json();

            document.getElementById('total-posts').textContent = stats.total_posts;
            document.getElementById('new-posts').textContent = stats.new_posts;
            document.getElementById('seen-posts').textContent = stats.seen_posts;
        }

        // Load ideas
        async function loadIdeas() {
            const response = await fetch('/api/ideas');
            allIdeas = await response.json();
            renderIdeas();
        }

        // Render ideas
        function renderIdeas() {
            const container = document.getElementById('ideas');

            let filtered = allIdeas;

            if (currentFilter === 'high') {
                filtered = allIdeas.filter(i => i.analysis.feasibility_score >= 70);
            } else if (currentFilter === 'medium') {
                filtered = allIdeas.filter(i => i.analysis.feasibility_score >= 50 && i.analysis.feasibility_score < 70);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">No ideas match this filter</div>';
                return;
            }

            container.innerHTML = filtered.map(idea => {
                const score = idea.analysis.feasibility_score;
                let badgeClass = 'badge-red';
                let scoreColor = '#ef4444';

                if (score >= 70) {
                    badgeClass = 'badge-green';
                    scoreColor = '#10b981';
                } else if (score >= 50) {
                    badgeClass = 'badge-green';
                    scoreColor = '#10b981';
                } else if (score >= 30) {
                    badgeClass = 'badge-yellow';
                    scoreColor = '#f59e0b';
                } else if (score >= 10) {
                    badgeClass = 'badge-orange';
                    scoreColor = '#f97316';
                }

                // AI analysis badge
                const aiIBadge = idea.analysis.is_ai_analysis ?
                    '<span style="background: #8b5cf6; color: white; padding: 5px 12px; border-radius: 8px; font-size: 0.75em; margin-left: 10px;">🧠 AI Analyzed</span>' :
                    '<span style="background: #6b7280; color: white; padding: 5px 12px; border-radius: 8px; font-size: 0.75em; margin-left: 10px;">🔤 Keyword Match</span>';

                return `
                    <div class="idea-card">
                        <div class="idea-header">
                            <div class="idea-title">${idea.title}</div>
                            <div style="display: flex; align-items: center;">
                                ${aiIBadge}
                                <div class="feasibility-badge ${badgeClass}" style="margin-left: 10px;">
                                    ${idea.analysis.verdict.split(' ')[0]}
                                </div>
                            </div>
                        </div>
                        
                        <div class="idea-meta">
                            <span>👤 ${idea.author}</span>
                            <span>⭐ ${idea.score} upvotes</span>
                            <span>💬 ${idea.comment_count} comments</span>
                            ${idea.analysis.business_model ? `<span>💼 ${idea.analysis.business_model}</span>` : ''}
                        </div>
                        
                        ${idea.analysis.tags && idea.analysis.tags.length > 0 ? `
                            <div style="margin: 10px 0; display: flex; flex-wrap: wrap; gap: 8px;">
                                ${idea.analysis.tags.map(tag => `
                                    <span style="background: #f0f9ff; color: #0369a1; padding: 4px 12px; border-radius: 12px; font-size: 0.85em;">
                                        #${tag}
                                    </span>
                                `).join('')}
                            </div>
                        ` : ''}
                        
                        <div class="score-circle" style="background: ${scoreColor}">
                            ${score}
                        </div>
                        
                        <div class="recommendation">
                            <strong>💡 AI Recommendation:</strong><br>
                            ${idea.analysis.recommendation}
                        </div>
                        
                        ${idea.analysis.key_insights && idea.analysis.key_insights.length > 0 ? `
                            <div style="background: #fef3c7; border-left: 4px solid #f59e0b; padding: 15px; margin: 15px 0; border-radius: 8px;">
                                <strong>✨ Key Insights:</strong>
                                ${idea.analysis.key_insights.map(insight => `
                                    <div style="padding: 6px 0; border-bottom: 1px solid #fde68a;">• ${insight}</div>
                                `).join('')}
                            </div>
                        ` : ''}
                        
                        ${idea.analysis.reasons_can_do.length > 0 ? `
                            <div class="reasons">
                                <strong>✅ Why You Can Do This:</strong>
                                ${idea.analysis.reasons_can_do.map(r => `
                                    <div class="reason-item">• ${r}</div>
                                `).join('')}
                            </div>
                        ` : ''}
                        
                        ${idea.analysis.reasons_cant_do.length > 0 ? `
                            <div class="reasons">
                                <strong>❌ Missing Skills:</strong>
                                ${idea.analysis.reasons_cant_do.map(r => `
                                    <div class="reason-item">• ${r}</div>
                                `).join('')}
                            </div>
                        ` : ''}
                        
                        <div class="details-grid">
                            <div class="detail-item">
                                <div class="detail-label">⏱️ Time</div>
                                <div class="detail-value">${idea.analysis.time_estimate}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">🎓 Difficulty</div>
                                <div class="detail-value">${idea.analysis.difficulty}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">💰 Profit</div>
                                <div class="detail-value">${idea.analysis.profit_potential}</div>
                            </div>
                        </div>
                        
                        ${idea.content ? `
                            <div class="content-preview">
                                ${idea.content.substring(0, 300)}${idea.content.length > 300 ? '...' : ''}
                            </div>
                        ` : ''}
                        
                        <a href="${idea.url}" target="_blank" class="view-post-btn">
                            🔗 View Full Post on Moltbook
                        </a>
                    </div>
                `;
            }).join('');
        }

        // Filter ideas
        function filterIdeas(filter) {
            currentFilter = filter;

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderIdeas();
        }

        // Mark all as seen
        async function markAllSeen() {
            if (confirm('Mark all current ideas as seen?')) {
                await fetch('/api/mark_seen', { method: 'POST' });
                await loadStats();
                alert('✅ All ideas marked as seen!');
            }
        }

        // Action: Post strategic question
        async function postQuestion() {
            const btn = document.getElementById('btn-post');
            btn.disabled = true;
            btn.textContent = '⏳ Posting...';

            try {
                const response = await fetch('/api/action/post-question', { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    alert('✅ ' + data.message);
                } else {
                    alert('❌ Error: ' + data.error);
                }
            } catch (error) {
                alert('❌ Failed to post: ' + error);
            }

            btn.disabled = false;
            btn.textContent = '📝 Post Strategic Question';
        }

        // Action: Collect comments
        async function collectComments() {
            const btn = document.getElementById('btn-collect');
            btn.disabled = true;
            btn.textContent = '⏳ Collecting...';

            try {
                const response = await fetch('/api/action/collect-comments', { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    alert('✅ ' + data.message);
                } else {
                    alert('❌ Error: ' + data.error);
                }
            } catch (error) {
                alert('❌ Failed to collect: ' + error);
            }

            btn.disabled = false;
            btn.textContent = '💬 Collect Comments';
        }

        // Action: Analyze comments
        async function analyzeComments() {
            const btn = document.getElementById('btn-analyze');
            btn.disabled = true;
            btn.textContent = '⏳ Analyzing...';

            try {
                const response = await fetch('/api/action/analyze-comments', { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    alert('✅ ' + data.message + '\n\nRefresh page to see results!');
                } else {
                    alert('❌ Error: ' + data.error);
                }
            } catch (error) {
                alert('❌ Failed to analyze: ' + error);
            }

            btn.disabled = false;
            btn.textContent = '🧠 Analyze Comments';
        }

        // Initial load
        loadStats();
        loadIdeas();

        // Auto-refresh every 30 seconds
        setInterval(loadStats, 30000);
    </script>
</body>

</html>
