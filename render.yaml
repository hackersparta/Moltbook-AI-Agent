services:
  - type: web
    name: moltbook-agent
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: ./start_render.sh
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: MOLTBOOK_API_KEY
        value: moltbook_sk_am2uChCF0nFa3q9_mAu9t6VJmOSIqObP
    disk:
      name: moltbook-data
      mountPath: /app/data
      sizeGB: 1
